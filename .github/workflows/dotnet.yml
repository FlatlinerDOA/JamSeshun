name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    # iOS is excluded — it requires a specific Xcode version not yet stable on runners
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x
    - name: Restore workloads
      run: dotnet workload restore JamSeshun.Android/JamSeshun.Android.csproj
    - name: Restore dependencies
      run: |
        dotnet restore JamSeshun/JamSeshun.csproj
        dotnet restore JamSeshun.Desktop/JamSeshun.Desktop.csproj
        dotnet restore JamSeshun.Android/JamSeshun.Android.csproj
        dotnet restore JamSeshun.Tests/JamSeshun.Tests.csproj
    - name: Build
      run: |
        dotnet build JamSeshun/JamSeshun.csproj --no-restore
        dotnet build JamSeshun.Desktop/JamSeshun.Desktop.csproj --no-restore
        dotnet build JamSeshun.Android/JamSeshun.Android.csproj --no-restore
        dotnet build JamSeshun.Tests/JamSeshun.Tests.csproj --no-restore
    - name: Test
      run: dotnet test JamSeshun.Tests/JamSeshun.Tests.csproj --no-build --verbosity normal
